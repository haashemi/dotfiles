- name: Linux
  packages:
    - base
    - base-devel
    - bluez
    - bluez-utils
    - iwd # Wifi Manager for networkmanager
    - linux-firmware
    - linux-zen
    - linux-zen-headers
    - networkmanager
    - pipewire-alsa
    - pipewire-jack
    - pipewire-pulse

- name: Zephyrus G15 Specific
  packages:
    - amd-ucode
    - nvidia-open-dkms
    - vulkan-radeon

- name: Fonts
  packages:
    - ttf-fira-code
    - ttf-firacode-nerd

- name: Niri
  packages:
    - niri
    - fuzzel # default application launcher in Niri
    - swaybg # background image
    - udiskie # to manage and auto-mount USB drives
    - waybar # a Wayland bar
    - xwayland-satellite # to run X11 apps

    # Shell - Uncategorized
    - adwaita-qt5-git
    - adwaita-qt6-git
    - brightnessctl
    - qt6ct
    - quickshell
    - swww

    # Gnome
    - gnome-keyring
